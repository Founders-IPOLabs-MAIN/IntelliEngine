<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" fill="none" aria-hidden="true">
  <!-- ============ Background decorative blue arc ============ -->
  <path d="M 60 360 Q 360 200 660 360 L 660 420 L 60 420 Z" fill="#6CB2DD" opacity="0.35"/>
  <path d="M 40 380 Q 360 240 680 380" stroke="#93C5E8" stroke-width="3" fill="none" opacity="0.55" stroke-linecap="round"/>

  <!-- Scattered dots -->
  <g fill="#5F3B87" opacity="0.4">
    <circle cx="80"  cy="80"  r="3"/>
    <circle cx="120" cy="40"  r="2"/>
    <circle cx="640" cy="60"  r="3"/>
    <circle cx="600" cy="120" r="2"/>
    <circle cx="60"  cy="220" r="2.5"/>
    <circle cx="680" cy="220" r="2"/>
  </g>
  <g fill="#1DA1F2" opacity="0.35">
    <circle cx="140" cy="70"  r="3.5"/>
    <circle cx="580" cy="40"  r="3"/>
    <circle cx="660" cy="180" r="2.5"/>
    <circle cx="40"  cy="160" r="3"/>
    <circle cx="360" cy="40"  r="2.5"/>
  </g>

  <!-- "Idea" speech bubbles drifting up -->
  <g fill="#E3833B" opacity="0.85">
    <circle cx="300" cy="90"  r="6"/>
    <circle cx="320" cy="70"  r="4"/>
    <circle cx="340" cy="55"  r="3"/>
  </g>
  <g fill="#1DA1F2" opacity="0.7">
    <circle cx="430" cy="100" r="6"/>
    <circle cx="455" cy="80"  r="4"/>
    <circle cx="475" cy="62"  r="3"/>
  </g>

  <!-- ============ DESK / TABLE ============ -->
  <rect x="220" y="320" width="280" height="14" rx="3" fill="#A2B3D2" stroke="#2D2D2D" stroke-width="2"/>
  <rect x="240" y="334" width="6" height="50" fill="#A2B3D2" stroke="#2D2D2D" stroke-width="2"/>
  <rect x="474" y="334" width="6" height="50" fill="#A2B3D2" stroke="#2D2D2D" stroke-width="2"/>

  <!-- ============ LAPTOP (centered on desk) ============ -->
  <!-- screen back -->
  <rect x="290" y="200" width="140" height="100" rx="6" fill="#FFFFFF" stroke="#2D2D2D" stroke-width="2.5"/>
  <!-- screen content area -->
  <rect x="298" y="208" width="124" height="84" rx="3" fill="#EAF4FB"/>
  <!-- on-screen mock chart bars -->
  <rect x="306" y="266" width="10" height="22" rx="1" fill="#1DA1F2" opacity="0.85"/>
  <rect x="320" y="256" width="10" height="32" rx="1" fill="#1DA1F2" opacity="0.7"/>
  <rect x="334" y="246" width="10" height="42" rx="1" fill="#1DA1F2" opacity="0.85"/>
  <rect x="348" y="234" width="10" height="54" rx="1" fill="#E3833B" opacity="0.9"/>
  <rect x="362" y="240" width="10" height="48" rx="1" fill="#1DA1F2" opacity="0.7"/>
  <rect x="376" y="226" width="10" height="62" rx="1" fill="#5F3B87" opacity="0.85"/>
  <!-- Trend line -->
  <path d="M 308 252 L 326 244 L 344 232 L 362 220 L 380 214 L 398 218 L 416 212"
        stroke="#0F1B3A" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- header bar with dots -->
  <rect x="298" y="208" width="124" height="14" rx="3" fill="#FFFFFF"/>
  <circle cx="305" cy="215" r="1.8" fill="#E3833B"/>
  <circle cx="312" cy="215" r="1.8" fill="#E3B23C"/>
  <circle cx="319" cy="215" r="1.8" fill="#10B981"/>
  <line x1="298" y1="222" x2="422" y2="222" stroke="#CFE3F2" stroke-width="1"/>
  <!-- laptop base -->
  <path d="M 280 300 L 440 300 L 450 320 L 270 320 Z" fill="#CFE3F2" stroke="#2D2D2D" stroke-width="2.5" stroke-linejoin="round"/>
  <rect x="345" y="306" width="30" height="3" rx="1" fill="#2D2D2D" opacity="0.4"/>

  <!-- ============ CHARACTER LEFT (standing/leaning) ============ -->
  <g>
    <!-- Yellow trousers -->
    <rect x="146" y="232" width="54" height="100" rx="6" fill="#E3B23C" stroke="#2D2D2D" stroke-width="2"/>
    <rect x="146" y="328" width="24" height="14" rx="3" fill="#FFFFFF" stroke="#2D2D2D" stroke-width="2"/>
    <rect x="176" y="328" width="24" height="14" rx="3" fill="#FFFFFF" stroke="#2D2D2D" stroke-width="2"/>

    <!-- Shirt body (light grey) -->
    <path d="M 138 178 Q 138 162 173 162 Q 208 162 208 178 L 208 238 L 138 238 Z" fill="#D7DCE4" stroke="#2D2D2D" stroke-width="2"/>
    <path d="M 173 162 L 165 238 L 181 238 Z" fill="#FFFFFF" stroke="#2D2D2D" stroke-width="1.5"/>
    <g fill="#333" opacity="0.55">
      <circle cx="148" cy="190" r="1"/><circle cx="160" cy="200" r="1"/><circle cx="153" cy="215" r="1"/>
      <circle cx="190" cy="186" r="1"/><circle cx="198" cy="208" r="1"/><circle cx="195" cy="225" r="1"/>
    </g>

    <!-- Right arm reaching toward laptop / pointing -->
    <path d="M 208 192 Q 250 220 282 244" stroke="#D7DCE4" stroke-width="14" stroke-linecap="round"/>
    <circle cx="284" cy="246" r="9" fill="#A2B3D2" stroke="#2D2D2D" stroke-width="1.5"/>
    <!-- Left arm down at side -->
    <path d="M 142 195 Q 132 230 142 256" stroke="#D7DCE4" stroke-width="13" stroke-linecap="round"/>

    <!-- Head -->
    <ellipse cx="173" cy="142" rx="22" ry="24" fill="#A2B3D2" stroke="#2D2D2D" stroke-width="2"/>
    <!-- Spiky purple hair -->
    <path d="M 152 134 L 156 116 L 161 127 L 167 112 L 173 124 L 180 112 L 184 128 L 190 118 L 196 136 Q 196 126 192 122 Q 173 106 159 116 Q 150 126 152 134 Z" fill="#5F3B87" stroke="#2D2D2D" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- Glasses -->
    <circle cx="165" cy="144" r="4.5" fill="#FFFFFF" stroke="#4A72B2" stroke-width="2"/>
    <circle cx="181" cy="144" r="4.5" fill="#FFFFFF" stroke="#4A72B2" stroke-width="2"/>
    <line x1="169.5" y1="144" x2="176.5" y2="144" stroke="#4A72B2" stroke-width="2"/>
    <!-- Blush -->
    <circle cx="159" cy="153" r="2" fill="#ECCBCB" opacity="0.85"/>
    <circle cx="187" cy="153" r="2" fill="#ECCBCB" opacity="0.85"/>
  </g>

  <!-- ============ CHARACTER RIGHT (seated, typing) ============ -->
  <g>
    <!-- Dark blue trousers (legs together, knees bent for typing) -->
    <rect x="510" y="240" width="54" height="100" rx="6" fill="#3A5993" stroke="#2D2D2D" stroke-width="2"/>
    <rect x="510" y="336" width="24" height="14" rx="3" fill="#FFFFFF" stroke="#2D2D2D" stroke-width="2"/>
    <rect x="540" y="336" width="24" height="14" rx="3" fill="#FFFFFF" stroke="#2D2D2D" stroke-width="2"/>

    <!-- Hoodie body (white) -->
    <path d="M 502 188 Q 502 172 537 172 Q 572 172 572 188 L 572 244 L 502 244 Z" fill="#FFFFFF" stroke="#2D2D2D" stroke-width="2"/>
    <!-- Hood (down on shoulders) -->
    <path d="M 514 178 Q 537 154 560 178 Q 552 172 537 172 Q 522 172 514 178 Z" fill="#FFFFFF" stroke="#2D2D2D" stroke-width="2"/>
    <!-- Hoodie subtle dots -->
    <g fill="#999" opacity="0.55">
      <circle cx="514" cy="200" r="1"/><circle cx="525" cy="215" r="1"/><circle cx="510" cy="228" r="1"/>
      <circle cx="558" cy="205" r="1"/><circle cx="548" cy="222" r="1"/><circle cx="565" cy="232" r="1"/>
    </g>
    <!-- Orange cuffs -->
    <rect x="498" y="216" width="14" height="12" rx="2" fill="#E3833B" stroke="#2D2D2D" stroke-width="1.5"/>
    <rect x="563" y="216" width="14" height="12" rx="2" fill="#E3833B" stroke="#2D2D2D" stroke-width="1.5"/>

    <!-- Arms reaching toward laptop keyboard -->
    <path d="M 504 222 Q 470 240 444 250" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round"/>
    <path d="M 504 222 Q 470 240 444 250" stroke="#2D2D2D" stroke-width="1" fill="none" opacity="0.2"/>
    <circle cx="442" cy="252" r="9" fill="#A2B3D2" stroke="#2D2D2D" stroke-width="1.5"/>
    <path d="M 568 222 Q 540 240 510 252" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round" opacity="0.7"/>

    <!-- Head -->
    <ellipse cx="537" cy="152" rx="22" ry="24" fill="#A2B3D2" stroke="#2D2D2D" stroke-width="2"/>
    <!-- Hair pulled back ponytail (dark blue) -->
    <path d="M 517 138 Q 522 122 537 119 Q 552 122 559 139 Q 559 129 547 123 Q 537 119 532 118 L 512 132 Q 510 138 517 138 Z" fill="#4A72B2" stroke="#2D2D2D" stroke-width="1.5" stroke-linejoin="round"/>
    <path d="M 559 137 Q 575 132 577 124 Q 575 137 567 147 Z" fill="#4A72B2" stroke="#2D2D2D" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- Hair tie -->
    <circle cx="573" cy="135" r="3" fill="#D94F5A" stroke="#2D2D2D" stroke-width="1"/>
    <!-- Glasses -->
    <circle cx="529" cy="155" r="4.5" fill="#FFFFFF" stroke="#4A72B2" stroke-width="2"/>
    <circle cx="545" cy="155" r="4.5" fill="#FFFFFF" stroke="#4A72B2" stroke-width="2"/>
    <line x1="533.5" y1="155" x2="540.5" y2="155" stroke="#4A72B2" stroke-width="2"/>
    <!-- Blush -->
    <circle cx="523" cy="163" r="2" fill="#ECCBCB" opacity="0.85"/>
    <circle cx="551" cy="163" r="2" fill="#ECCBCB" opacity="0.85"/>
  </g>

  <!-- Connecting orange arc between heads (collaboration cue) -->
  <path d="M 200 110 Q 360 50 510 120" stroke="#E3833B" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.55" stroke-dasharray="3 6"/>
</svg>
